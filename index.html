<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legacy by Silverglades | Sector-63A, Gurugram</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        legacy: {
                            dark: '#1a1d20',
                            rosegold: '#c19a6b', 
                            light: '#f4f4f4',
                            gray: '#2a2d34'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #1a1d20; color: white; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Data Object with Image Paths Added ---
        const projectData = {
            name: "The Legacy",
            developer: "Silverglades",
            location: "Sector-63A, Gurugram",
            rera: "88 of 2024",
            heroImage: "./images/hero-bg.jpeg", // Make sure this image exists in an 'images' folder
            highlights: [
                "Seamless access to a 60-meter wide road on Millionaires' Row",
                "2-minute drive to Golf Course & Extension Road",
                "Spectacular unobstructed Aravalli Views",
                "Eco-friendly measures & energy-efficient systems"
            ],
            amenities: [
                { icon: "coffee", name: "Club Verve (Cafe & Lounges)" },
                { icon: "waves", name: "Outdoor Swimming Pool & Lagoon" },
                { icon: "dumbbell", name: "State-of-the-art Gym & Wellness" },
                { icon: "trees", name: "Nature Walk & Pristine Landscapes" },
                { icon: "shield-check", name: "3-Tier Security & CCTV" },
                { icon: "activity", name: "Sports Zone (Tennis, Cricket)" }
            ],
            typologies: [
                { type: "3BHK", carpet: "1614", super: "2800", img: "./images/plan-3bhk.jpg" },
                { type: "4BHK Typical", carpet: "2211", super: "3800", img: "./images/plan-4bhk.jpg" },
                { type: "5BHK Penthouse", carpet: "3300", super: "5900", img: "./images/plan-5bhk.jpg" }
            ]
        };

        const Navbar = () => (
            <nav className="fixed w-full z-50 bg-legacy-dark/90 backdrop-blur-md border-b border-legacy-rosegold/20">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
                    <div className="text-2xl font-serif font-bold text-white tracking-widest uppercase">
                        {projectData.name} <span className="text-legacy-rosegold text-sm font-sans tracking-normal block">BY {projectData.developer.toUpperCase()}</span>
                    </div>
                    <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-wide text-gray-300">
                        <a href="#overview" className="hover:text-legacy-rosegold transition">OVERVIEW</a>
                        <a href="#amenities" className="hover:text-legacy-rosegold transition">AMENITIES</a>
                        <a href="#floorplans" className="hover:text-legacy-rosegold transition">FLOOR PLANS</a>
                    </div>
                    <button className="bg-legacy-rosegold text-legacy-dark px-6 py-2 rounded font-bold hover:bg-white transition duration-300">
                        Download Brochure
                    </button>
                </div>
            </nav>
        );

        const Hero = () => (
            <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden min-h-screen flex items-center">
                <div className="absolute inset-0 z-0">
                    {/* Background Image injected here */}
                    <img src={projectData.heroImage} alt="The Legacy Hero" className="w-full h-full object-cover opacity-50" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='block';}} />
                    {/* Fallback if image is missing */}
                    <div className="hidden w-full h-full bg-slate-800 animate-pulse mix-blend-overlay opacity-40 absolute inset-0"></div>
                </div>
                <div className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <div className="flex flex-col justify-center">
                        <h1 className="text-5xl md:text-7xl font-bold mb-4 text-white drop-shadow-lg">
                            An Address For The <br/><span className="text-legacy-rosegold italic drop-shadow-md">Distinguished Few.</span>
                        </h1>
                        <p className="text-xl text-gray-100 mb-8 max-w-lg drop-shadow-md font-medium">
                            Located on {projectData.location}, featuring spectacular Aravalli views and a central lagoon.
                        </p>
                    </div>
                    
                    <div className="bg-legacy-dark/90 backdrop-blur-xl p-8 rounded-lg border border-legacy-rosegold/50 shadow-2xl relative">
                        {/* Decorative Corner Accents */}
                        <div className="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-legacy-rosegold rounded-tl-lg"></div>
                        <div className="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-legacy-rosegold rounded-br-lg"></div>
                        
                        <h3 className="text-2xl font-serif mb-6 text-center text-legacy-rosegold">Register Interest</h3>
                        <form className="space-y-4 relative z-10">
                            <input type="text" placeholder="Full Name" className="w-full p-3 bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                            <input type="tel" placeholder="Phone Number" className="w-full p-3 bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                            <input type="email" placeholder="Email Address" className="w-full p-3 bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                            <button className="w-full bg-legacy-rosegold text-legacy-dark font-bold py-3 rounded hover:bg-white transition duration-300 mt-2">
                                Get Floor Plans & Pricing
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        );

        const Overview = () => (
            <section id="overview" className="py-20 bg-legacy-dark">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                    <h2 className="text-4xl font-serif mb-12 text-legacy-rosegold">A Masterplan of Excellence</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        {projectData.highlights.map((highlight, index) => (
                            <div key={index} className="p-6 bg-legacy-gray rounded-lg border border-gray-700 hover:border-legacy-rosegold transition">
                                <i data-lucide="star" className="w-8 h-8 text-legacy-rosegold mx-auto mb-4"></i>
                                <p className="text-gray-300">{highlight}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const FloorPlans = () => (
            <section id="floorplans" className="py-20 bg-legacy-gray border-t border-legacy-rosegold/10">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <h2 className="text-4xl font-serif mb-12 text-center text-legacy-rosegold">Curated Timeless Spaces</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {projectData.typologies.map((plan, index) => (
                            <div key={index} className="bg-legacy-dark p-6 rounded-lg shadow-xl border border-gray-700 hover:border-legacy-rosegold/50 transition duration-300 group">
                                {/* Floor Plan Image */}
                                <div className="w-full h-64 bg-legacy-gray rounded mb-6 overflow-hidden border border-gray-600 relative">
                                    <img src={plan.img} alt={`${plan.type} Floor Plan`} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='flex';}} />
                                    {/* Fallback if image is missing */}
                                    <div className="hidden absolute inset-0 items-center justify-center text-gray-500 flex-col">
                                        <i data-lucide="image" className="w-10 h-10 mb-2 opacity-50"></i>
                                        <span className="text-sm">Image not found: {plan.img}</span>
                                    </div>
                                </div>
                                <h3 className="text-2xl font-bold mb-2 text-white">{plan.type}</h3>
                                <div className="text-gray-400 space-y-1 mb-6 text-sm">
                                    <p className="flex justify-between border-b border-gray-700 pb-1"><span>Carpet Area:</span> <span className="text-white font-semibold">{plan.carpet} sq.ft.</span></p>
                                    <p className="flex justify-between pt-1"><span>Super Area:</span> <span className="text-white font-semibold">{plan.super} sq.ft.</span></p>
                                </div>
                                <button className="w-full py-3 border-2 border-legacy-rosegold text-legacy-rosegold font-bold rounded hover:bg-legacy-rosegold hover:text-legacy-dark transition duration-300">
                                    Request Pricing
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        // ... (Amenities, Location, Footer, and FloatingCTAs remain exactly the same as before) ...
        const Amenities = () => ( <section id="amenities" className="py-20 bg-legacy-dark"><div className="max-w-7xl mx-auto px-4"><h2 className="text-4xl font-serif mb-12 text-center text-legacy-rosegold">Unlimited Indulgence</h2><div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 text-center">{projectData.amenities.map((amenity, index) => (<div key={index} className="p-4"><div className="w-16 h-16 mx-auto bg-legacy-gray rounded-full flex items-center justify-center mb-4 border border-legacy-rosegold/50"><i data-lucide={amenity.icon} className="w-8 h-8 text-legacy-rosegold"></i></div><h4 className="text-sm font-semibold text-gray-300">{amenity.name}</h4></div>))}</div></div></section>);
        const Location = () => ( <section id="location" className="py-20 bg-legacy-gray border-t border-legacy-rosegold/10"><div className="max-w-7xl mx-auto px-4 text-center"><h2 className="text-4xl font-serif mb-8 text-legacy-rosegold">The World At Your Doorstep</h2><p className="text-gray-400 mb-12 max-w-2xl mx-auto">Seamless connectivity to major highways, business hubs, top-tier schools, and hospitals in the NCR region.</p><div className="w-full h-96 bg-legacy-dark rounded-lg flex items-center justify-center border border-gray-700"><i data-lucide="map" className="w-12 h-12 text-gray-500 mb-2 block mx-auto"></i><span className="text-gray-500">Map Embed Placeholder (Sector-63A, Gurugram)</span></div></div></section>);
        const Footer = () => ( <footer className="bg-[#111315] py-12 text-center text-sm text-gray-500 border-t border-legacy-rosegold/20"><div className="max-w-7xl mx-auto px-4"><p className="mb-2 font-serif text-lg text-legacy-rosegold">{projectData.name} by {projectData.developer}</p><p className="mb-4">RERA Registration No. {projectData.rera}</p><p className="mt-8">&copy; 2026 {projectData.developer}. All rights reserved.</p></div></footer>);
        
        const FloatingCTAs = () => (
            <div className="fixed bottom-6 right-6 flex flex-col space-y-4 z-50">
                <a href="tel:+919810559626" className="w-14 h-14 bg-legacy-gray border border-legacy-rosegold rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition group cursor-pointer relative">
                    <i data-lucide="phone" className="text-legacy-rosegold w-6 h-6"></i>
                    <span className="absolute right-16 bg-legacy-dark text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap">Call Us</span>
                </a>
                <a href="https://wa.me/919810559626?text=Hi%20I%20am%20interested%20in%20The%20Legacy" target="_blank" className="w-14 h-14 bg-[#25D366] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition group cursor-pointer relative">
                    <svg className="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.567-10.563 5.824 0 10.564 4.74 10.564 10.564 0 5.825-4.74 10.565-10.564 10.564z"/></svg>
                    <span className="absolute right-16 bg-legacy-dark text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap">Chat on WhatsApp</span>
                </a>
                <div className="w-14 h-14 bg-legacy-rosegold rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition group cursor-pointer relative" onClick={() => alert('Prithvi AI Agent Widget will open here.')}>
                    <i data-lucide="message-square" className="text-legacy-dark w-6 h-6"></i>
                    <span className="absolute right-16 bg-legacy-dark text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap">Ask AI Agent</span>
                </div>
            </div>
        );

        const App = () => {
            useEffect(() => { lucide.createIcons(); });
            return (
                <div className="min-h-screen bg-legacy-dark selection:bg-legacy-rosegold selection:text-legacy-dark">
                    <Navbar /><Hero /><Overview /><FloorPlans /><Amenities /><Location /><Footer /><FloatingCTAs />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
