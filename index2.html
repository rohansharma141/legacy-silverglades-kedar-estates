<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legacy by Silverglades | Kedar Estates</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        legacy: {
                            dark: '#1a1d20',
                            rosegold: '#c19a6b', 
                            light: '#f4f4f4',
                            gray: '#2a2d34'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #1a1d20; color: white; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body id="top">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Master Data Object ---
        const projectData = {
            name: "The Legacy",
            developer: "Silverglades",
            brokerage: "Kedar Estates",
            brokerName: "Vinod Joshi",
            contactPhone: "9810559626",
            location: "Sector-63A, Gurugram",
            rera: "88 of 2024",
            landArea: "10.46 Acres (Phase 1 on 9.95 Acres)",
            logoImage: "./images/The Legacy by Silverglades - Presentation_Aug/logo.jpg",
            heroImage: "./images/The Legacy by Silverglades - Presentation_Aug/hero-bg.jpeg",
            masterPlanImage: "./images/The Legacy by Silverglades - Presentation_Aug/master-plan.jpeg",
            locationMapImage: "./images/The Legacy by Silverglades - Presentation_Aug/location-map.jpeg",
            amenitiesClubVerve: "./images/The Legacy by Silverglades - Presentation_Aug/club-verve.jpeg",
            amenitiesSwimmingPool: "./images/The Legacy by Silverglades - Presentation_Aug/swimming-pool.jpeg",
            amenitiesLawnTennis: "./images/The Legacy by Silverglades - Presentation_Aug/lawn-tennis.jpeg",
            highlights: [
                "Seamless access to the 60-meter wide road on Millionaires' Row",
                "2-minute drive to Golf Course and Extension Road",
                "Unblocked views of Aravalli & Central Landscape",
                "Sustainable living with eco-friendly measures"
            ],
            amenities: [
                { icon: "coffee", name: "Club Verve (Coffee Shop & Patisserie)" },
                { icon: "utensils", name: "Restaurant, Lounge & Bar" },
                { icon: "waves", name: "Outdoor Swimming Pool & Splash Pool" },
                { icon: "dumbbell", name: "State-of-the-art Gym, Spa & Sauna" },
                { icon: "trees", name: "Nature Walk & Central Lagoon" },
                { icon: "activity", name: "Tennis, Badminton & Basketball Courts" }
            ],
            floorPlans: [
                { type: "3BHK Typical Unit (Tower A)", carpet: "1614", super: "2800", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-3bhk.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-3bhk.pdf" },
                { type: "4BHK Typical Unit (Tower B1/B2)", carpet: "2211", super: "3800", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-4bhk.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-4bhk.pdf" },
                { type: "4BHK Penthouse L1 (Tower A)", carpet: "2374", super: "4200", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-4bhk-ph-l1.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-4bhk-ph-l1.pdf" },
                { type: "4BHK Penthouse L2 (Tower A)", carpet: "2374", super: "4200", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-4bhk-ph-l2.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-4bhk-ph-l2.pdf" },
                { type: "5BHK Penthouse L1 (Tower B1/B2)", carpet: "3300", super: "5900", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-5bhk-ph-l1.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-5bhk-ph-l1.pdf" },
                { type: "5BHK Penthouse L2 (Tower B1/B2)", carpet: "3300", super: "5900", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-5bhk-ph-l2.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-5bhk-ph-l2.pdf" },
                { type: "4BHK + S Typical (Tower C1)", carpet: "2810", super: "4800", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-4bhk-s.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-4bhk-s.pdf" },
                { type: "5BHK + S Penthouse L1 (Tower C1)", carpet: "4164", super: "7700", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-5bhk-s-ph-l1.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-5bhk-s-ph-l1.pdf" },
                { type: "5BHK + S Penthouse L2 (Tower C1)", carpet: "4164", super: "7700", img: "./images/The Legacy by Silverglades - Presentation_Aug/plan-5bhk-s-ph-l2.jpeg", pdf: "./pdfs/The Legacy by Silverglades - Presentation_Aug/plan-5bhk-s-ph-l2.pdf" }
            ]
        };

        // --- Modals ---
        const EnquiryModal = ({ isOpen, onClose }) => {
            useEffect(() => {
                const handleKeyDown = (e) => { if (e.key === 'Escape') onClose(); };
                if (isOpen) window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isOpen, onClose]);

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 transition-opacity">
                    <div className="bg-legacy-dark border border-legacy-rosegold/50 p-8 rounded-xl shadow-2xl w-full max-w-md relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white transition">
                            <i data-lucide="x" className="w-6 h-6"></i>
                        </button>
                        <h3 className="text-3xl font-serif mb-6 text-center text-legacy-rosegold">Enquire Now</h3>
                        <p className="text-gray-400 text-sm text-center mb-6">Leave your details and our advisory team will contact you shortly.</p>
                        <form className="space-y-4">
                            <input type="text" placeholder="Full Name" className="w-full p-3 text-base bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                            <input type="tel" placeholder="Phone Number" className="w-full p-3 text-base bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                            <input type="email" placeholder="Email Address" className="w-full p-3 text-base bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                            <button className="w-full bg-legacy-rosegold text-legacy-dark text-lg font-bold py-3 rounded hover:bg-white transition duration-300 mt-4 shadow-lg">
                                Submit Details
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const ImageLightboxModal = ({ imageSrc, onClose }) => {
            useEffect(() => {
                const handleKeyDown = (e) => { if (e.key === 'Escape') onClose(); };
                if (imageSrc) window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [imageSrc, onClose]);

            if (!imageSrc) return null;
            return (
                <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/95 backdrop-blur-md p-4 transition-opacity" onClick={onClose}>
                    <button onClick={onClose} className="absolute top-6 right-6 text-gray-400 hover:text-white transition z-50 bg-black/50 p-2 rounded-full border border-gray-600 hover:border-legacy-rosegold hover:scale-110">
                        <i data-lucide="x" className="w-8 h-8 text-legacy-rosegold"></i>
                    </button>
                    <img src={imageSrc} alt="Expanded View" className="max-w-full max-h-[90vh] object-contain rounded shadow-2xl" onClick={(e) => e.stopPropagation()} />
                </div>
            );
        };

        // --- Sections ---
        const Navbar = ({ onEnquire }) => (
            <nav className="fixed w-full z-50 bg-legacy-dark/95 backdrop-blur-md border-b border-legacy-rosegold/20">
                <div className="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-24">
                    <div className="flex items-center space-x-4">
                        <img src={projectData.logoImage} alt={`${projectData.developer} Logo`} className="h-12 md:h-16 object-contain" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='flex';}} />
                        <div className="hidden w-12 h-12 bg-legacy-rosegold rounded items-center justify-center">
                            <i data-lucide="building-2" className="text-legacy-dark w-8 h-8"></i>
                        </div>
                        <div className="text-3xl font-serif font-bold text-white tracking-widest uppercase leading-tight">
                            {projectData.name} <span className="text-legacy-rosegold text-sm font-sans tracking-normal block">BY {projectData.developer.toUpperCase()}</span>
                        </div>
                    </div>
                    <div className="hidden xl:flex space-x-8 text-base font-semibold tracking-wide text-gray-300">
                        <a href="#overview" className="hover:text-legacy-rosegold transition">OVERVIEW</a>
                        <a href="#amenities" className="hover:text-legacy-rosegold transition">AMENITIES</a>
                        <a href="#pricelist" className="hover:text-legacy-rosegold transition">PRICE LIST</a>
                        <a href="#floorplans" className="hover:text-legacy-rosegold transition">FLOOR PLANS</a>
                        <a href="#location" className="hover:text-legacy-rosegold transition">LOCATION MAP</a>
                        <a href="#contact" className="hover:text-legacy-rosegold transition">CONTACT US</a>
                    </div>
                    <button onClick={onEnquire} className="hidden md:block bg-legacy-rosegold text-legacy-dark px-8 py-3 rounded text-lg font-bold hover:bg-white transition duration-300">
                        Enquire Now
                    </button>
                </div>
            </nav>
        );

        const Hero = () => (
            <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden min-h-screen flex items-center">
                <div className="absolute inset-0 z-0">
                    <img src={projectData.heroImage} alt="Hero Background" className="w-full h-full object-cover opacity-50" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='block';}} />
                    <div className="hidden w-full h-full bg-slate-800 animate-pulse mix-blend-overlay opacity-40 absolute inset-0"></div>
                </div>
                <div className="relative z-10 max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-12 gap-12">
                    <div className="flex flex-col justify-center lg:col-span-7">
                        <h1 className="text-6xl md:text-8xl font-bold mb-6 text-white drop-shadow-2xl leading-tight">
                            An Address Where Everyday <br/><span className="text-legacy-rosegold italic drop-shadow-xl">Feels like a Getaway</span>
                        </h1>
                        <p className="text-2xl text-gray-100 mb-8 max-w-2xl drop-shadow-md font-medium">
                            Located on {projectData.location}, featuring spectacular Aravalli views.
                        </p>
                    </div>
                    <div className="lg:col-span-5 flex items-center">
                        <div id="hero-form" className="w-full bg-legacy-dark/90 backdrop-blur-xl p-10 rounded-lg border border-legacy-rosegold/50 shadow-2xl relative scroll-mt-32">
                            <h3 className="text-3xl font-serif mb-8 text-center text-legacy-rosegold">Register Your Interest</h3>
                            <form className="space-y-5 relative z-10">
                                <input type="text" placeholder="Full Name" className="w-full p-4 text-lg bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                                <input type="tel" placeholder="Phone Number" className="w-full p-4 text-lg bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                                <input type="email" placeholder="Email Address" className="w-full p-4 text-lg bg-legacy-gray/50 border border-gray-600 rounded text-white focus:outline-none focus:border-legacy-rosegold transition" required/>
                                <button className="w-full bg-legacy-rosegold text-legacy-dark text-xl font-bold py-4 rounded hover:bg-white transition duration-300 mt-4 shadow-lg hover:shadow-legacy-rosegold/50">
                                    Download Brochure & Price List
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Overview = () => (
            <section id="overview" className="py-24 bg-legacy-dark scroll-mt-20">
                <div className="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="text-center mb-16">
                        <h2 className="text-5xl font-serif mb-8 text-legacy-rosegold">A Masterplan of Excellence</h2>
                        <p className="text-xl text-gray-300 max-w-5xl mx-auto leading-relaxed">
                            Founded in 1988, {projectData.developer} is India's premier boutique developer, renowned for crafting luxury addresses and iconic landmarks throughout Delhi NCR for over 35 glorious years. {projectData.name} continues this tradition, offering an exclusive lifestyle surrounded by nature's magic.
                        </p>
                    </div>

                    <div className="bg-legacy-gray border border-gray-700 rounded-lg overflow-hidden shadow-2xl max-w-5xl mx-auto">
                        <table className="w-full text-left border-collapse">
                            <tbody className="text-lg">
                                <tr className="border-b border-gray-700 hover:bg-legacy-dark/30 transition">
                                    <th className="py-6 px-8 bg-legacy-dark/50 text-legacy-rosegold font-semibold w-1/3">Project Name</th>
                                    <td className="py-6 px-8 text-white">{projectData.name} by {projectData.developer}</td>
                                </tr>
                                <tr className="border-b border-gray-700 hover:bg-legacy-dark/30 transition">
                                    <th className="py-6 px-8 bg-legacy-dark/50 text-legacy-rosegold font-semibold">RERA Number</th>
                                    <td className="py-6 px-8 text-white font-mono">{projectData.rera}</td>
                                </tr>
                                <tr className="border-b border-gray-700 hover:bg-legacy-dark/30 transition">
                                    <th className="py-6 px-8 bg-legacy-dark/50 text-legacy-rosegold font-semibold">Location</th>
                                    <td className="py-6 px-8 text-white">{projectData.location}</td>
                                </tr>
                                <tr className="border-b border-gray-700 hover:bg-legacy-dark/30 transition">
                                    <th className="py-6 px-8 bg-legacy-dark/50 text-legacy-rosegold font-semibold">Configurations</th>
                                    <td className="py-6 px-8 text-white">3BHK, 4BHK, 5BHK & Penthouses</td>
                                </tr>
                                <tr className="border-b border-gray-700 hover:bg-legacy-dark/30 transition">
                                    <th className="py-6 px-8 bg-legacy-dark/50 text-legacy-rosegold font-semibold">Apartment Size Range</th>
                                    <td className="py-6 px-8 text-white">2800 sq.ft. – 7700 sq.ft. (Super Area)</td>
                                </tr>
                                <tr className="hover:bg-legacy-dark/30 transition">
                                    <th className="py-6 px-8 bg-legacy-dark/50 text-legacy-rosegold font-semibold">Total Land Area</th>
                                    <td className="py-6 px-8 text-white">{projectData.landArea}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div className="mt-16 bg-legacy-gray border border-gray-700 rounded-xl overflow-hidden shadow-2xl max-w-5xl mx-auto relative group p-4 bg-opacity-50">
                        <img src={projectData.masterPlanImage} alt="Master Plan" className="w-full h-auto object-cover rounded shadow-inner" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='flex';}} />
                        <div className="hidden absolute inset-0 items-center justify-center text-gray-500 bg-legacy-gray min-h-[400px]">
                            <i data-lucide="map" className="w-12 h-12 mr-3"></i> Master Plan Image Placeholder
                        </div>
                    </div>
                </div>
            </section>
        );

        const Amenities = () => (
            <section id="amenities" className="py-24 bg-legacy-gray border-t border-legacy-rosegold/10 scroll-mt-20">
                <div className="max-w-[85%] mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="text-center mb-16">
                        <h2 className="text-5xl font-serif mb-8 text-legacy-rosegold">Unlimited Indulgence For A Select Few</h2>
                        <p className="text-xl text-gray-400 max-w-4xl mx-auto leading-relaxed">
                            Experience over 100 amenities designed for your wellness and social delight. From the central hub of Club Verve to the serene Nature Walk, every moment here is crafted for perfection.
                        </p>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16">
                         <div className="h-80 bg-slate-800 rounded-xl overflow-hidden relative group shadow-lg">
                             <img src={projectData.amenitiesClubVerve} alt="Club Verve" className="w-full h-full object-cover group-hover:scale-110 transition duration-700" onError={(e) => {e.target.style.display='none';}}/>
                             <div className="absolute inset-0 bg-gradient-to-t from-legacy-dark via-legacy-dark/50 to-transparent flex items-end p-8">
                                 <h4 className="text-3xl font-serif text-white">Club Verve Hub</h4>
                             </div>
                         </div>
                         <div className="h-80 bg-slate-800 rounded-xl overflow-hidden relative group shadow-lg">
                            <img src={projectData.amenitiesLawnTennis} alt="Lawn Tennis" className="w-full h-full object-cover group-hover:scale-110 transition duration-700" onError={(e) => {e.target.style.display='none';}}/>
                             <div className="absolute inset-0 flex items-center justify-center text-gray-600"><i data-lucide="waves" className="w-20 h-20"></i></div>
                             <div className="absolute inset-0 bg-gradient-to-t from-legacy-dark via-legacy-dark/50 to-transparent flex items-end p-8">
                                 <h4 className="text-3xl font-serif text-white">Lawn Tennis</h4>
                             </div>
                         </div>
                         <div className="h-80 bg-slate-800 rounded-xl overflow-hidden relative group shadow-lg">
                         <img src={projectData.amenitiesSwimmingPool} alt="Swimming Pool" className="w-full h-full object-cover group-hover:scale-110 transition duration-700" onError={(e) => {e.target.style.display='none';}}/>
                             <div className="absolute inset-0 flex items-center justify-center text-gray-600"><i data-lucide="trees" className="w-20 h-20"></i></div>
                             <div className="absolute inset-0 bg-gradient-to-t from-legacy-dark via-legacy-dark/50 to-transparent flex items-end p-8">
                                 <h4 className="text-3xl font-serif text-white">Swimming Pool</h4>
                             </div>
                         </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 text-center">
                        {projectData.amenities.map((amenity, index) => (
                            <div key={index} className="p-6 border border-gray-700 rounded-xl bg-legacy-dark hover:border-legacy-rosegold transition shadow-md hover:shadow-legacy-rosegold/20">
                                <div className="w-20 h-20 mx-auto bg-legacy-gray rounded-full flex items-center justify-center mb-6 border border-gray-600">
                                    <i data-lucide={amenity.icon} className="w-10 h-10 text-legacy-rosegold"></i>
                                </div>
                                <h4 className="text-base font-semibold text-gray-200 leading-snug">{amenity.name}</h4>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const PriceList = ({ onEnquire }) => (
            <section id="pricelist" className="py-24 bg-legacy-dark scroll-mt-20">
                <div className="max-w-[85%] mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="text-center mb-16">
                        <h2 className="text-5xl font-serif mb-8 text-legacy-rosegold">Pricing & Investment</h2>
                        <p className="text-xl text-gray-300 max-w-4xl mx-auto leading-relaxed">
                            Secure your legacy at one of the most coveted addresses in Delhi NCR. We offer flexible payment plans, and attractive home loan options can be availed through all major leading banks.
                        </p>
                    </div>

                    <div className="overflow-x-auto rounded-xl border border-gray-700 shadow-2xl">
                        <table className="w-full text-left border-collapse bg-legacy-gray">
                            <thead>
                                <tr className="bg-[#111315] text-legacy-rosegold border-b border-gray-600">
                                    <th className="py-6 px-8 text-xl font-semibold">Unit Typology</th>
                                    <th className="py-6 px-8 text-xl font-semibold">Super Area (Sq.Ft.)</th>
                                    <th className="py-6 px-8 text-xl font-semibold text-right">Unit Price</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-700">
                                {projectData.floorPlans.map((plan, index) => (
                                    <tr key={index} className="hover:bg-legacy-dark/70 transition">
                                        <td className="py-6 px-8 text-white text-lg font-medium">{plan.type}</td>
                                        <td className="py-6 px-8 text-gray-300 text-lg">{plan.super} sq.ft.</td>
                                        <td className="py-6 px-8 text-right text-legacy-rosegold text-xl font-bold tracking-wide">On Request</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="mt-12 text-center">
                         <button onClick={onEnquire} className="bg-legacy-rosegold text-legacy-dark px-10 py-4 rounded text-xl font-bold hover:bg-white transition duration-300 shadow-lg">
                            Request Complete Pricing Details
                        </button>
                    </div>
                </div>
            </section>
        );

        const FloorPlans = ({ onImageClick }) => {
            // Function to forcefully trigger a file download using Blob interception
            const handleForceDownload = (e, fileUrl, fileName) => {
                e.preventDefault();
                fetch(fileUrl)
                    .then(response => response.blob())
                    .then(blob => {
                        const url = window.URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = fileName;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        window.URL.revokeObjectURL(url);
                    })
                    .catch(err => {
                        console.error('Blob download failed. Falling back to default link behavior.', err);
                        // Fallback: Just open it in a new tab if the fetch fails (e.g. CORS on local files)
                        window.open(fileUrl, '_blank');
                    });
            };

            return (
                <section id="floorplans" className="py-24 bg-legacy-gray border-t border-legacy-rosegold/10 scroll-mt-20">
                    <div className="max-w-[85%] mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <h2 className="text-5xl font-serif mb-8 text-legacy-rosegold">Curated Timeless Spaces</h2>
                            <p className="text-xl text-gray-300 max-w-5xl mx-auto leading-relaxed">
                                Every residence is a canvas of expansive interiors and outdoor decks. The developer takes exceptional care in designing layouts that cater to all lifestyle needs, ensuring maximum privacy with dedicated lift lobbies for 3 & 4 BHK residences. Experience architecture that promises joy in every moment.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {projectData.floorPlans.map((plan, index) => {
                                const downloadFileName = `${plan.type.replace(/[^a-zA-Z0-9]/g, '-')}-FloorPlan.pdf`;

                                return (
                                    <div key={index} className="bg-legacy-dark p-6 rounded-xl shadow-2xl border border-gray-700 hover:border-legacy-rosegold/60 transition duration-300 group flex flex-col">
                                        <div 
                                            className="w-full h-56 bg-slate-800 rounded-lg mb-6 overflow-hidden border border-gray-600 relative cursor-pointer"
                                            onClick={() => onImageClick(plan.img)}
                                        >
                                            <img src={plan.img} alt={`${plan.type} Layout`} className="w-full h-full object-cover group-hover:scale-105 group-hover:opacity-80 transition duration-500" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='flex';}} />
                                            <div className="absolute inset-0 bg-legacy-dark/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                <i data-lucide="zoom-in" className="text-white w-10 h-10 drop-shadow-md"></i>
                                            </div>
                                            <div className="hidden absolute inset-0 items-center justify-center text-gray-400 flex-col bg-legacy-gray p-4 text-center">
                                                <i data-lucide="layout-template" className="w-12 h-12 mb-3 opacity-50"></i>
                                                <span className="text-xs">Image required: <br/>{plan.img.split('/').pop()}</span>
                                            </div>
                                        </div>
                                        <h3 className="text-xl font-bold mb-4 text-white flex-grow">{plan.type}</h3>
                                        <div className="text-gray-300 space-y-2 mb-4 text-sm">
                                            <p className="flex justify-between border-b border-gray-700 pb-2"><span>Carpet Area:</span> <span className="text-white font-semibold">{plan.carpet} sq.ft.</span></p>
                                            <p className="flex justify-between pt-1"><span>Super Area:</span> <span className="text-white font-semibold">{plan.super} sq.ft.</span></p>
                                        </div>
                                        
                                        {/* Intercepts the click to forcefully download the Blob data */}
                                        <a 
                                            href={plan.pdf} 
                                            download={downloadFileName}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            onClick={(e) => handleForceDownload(e, plan.pdf, downloadFileName)} 
                                            className="w-full flex items-center justify-center space-x-2 py-3 mt-2 text-legacy-rosegold hover:text-white transition duration-300 text-sm border-t border-gray-700/50 pt-5 cursor-pointer"
                                        >
                                            <i data-lucide="download" className="w-4 h-4"></i>
                                            <span>Download Floor Plan</span>
                                        </a>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </section>
            );
        };

        const Location = ({ onImageClick }) => (
            <section id="location" className="py-24 bg-legacy-dark scroll-mt-20">
                <div className="max-w-[85%] mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                        <div>
                            <h2 className="text-5xl font-serif mb-8 text-legacy-rosegold">The World At Your Doorstep</h2>
                            <p className="text-xl text-gray-300 mb-8 leading-relaxed">
                                Situated strategically in {projectData.location}, this address offers seamless connectivity to major hubs. It enjoys direct access via the 60-meter wide road that graces Millionaires' Row, ensuring smooth approachability.
                            </p>
                            <ul className="space-y-6 text-gray-300 text-lg mb-10">
                                <li className="flex items-start"><i data-lucide="check-circle" className="text-legacy-rosegold w-6 h-6 mr-4 mt-1 shrink-0"></i> <span>Just a 2-minute drive to Golf Course and Golf Course Extension Road.</span></li>
                                <li className="flex items-start"><i data-lucide="check-circle" className="text-legacy-rosegold w-6 h-6 mr-4 mt-1 shrink-0"></i> <span>Close proximity to top healthcare including Medanta, Fortis, and Artemis Hospitals.</span></li>
                                <li className="flex items-start"><i data-lucide="check-circle" className="text-legacy-rosegold w-6 h-6 mr-4 mt-1 shrink-0"></i> <span>Near premier educational institutions like Amity Int. School and Suncity School.</span></li>
                            </ul>
                            
                            <div 
                                className="w-full h-64 bg-legacy-gray rounded-xl overflow-hidden border border-gray-700 relative shadow-xl cursor-pointer group"
                                onClick={() => onImageClick(projectData.locationMapImage)}
                            >
                                <img src={projectData.locationMapImage} alt="Brochure Location Map" className="w-full h-full object-cover group-hover:scale-105 group-hover:opacity-80 transition duration-500" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='flex';}} />
                                <div className="absolute inset-0 bg-legacy-dark/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <i data-lucide="zoom-in" className="text-white w-12 h-12 drop-shadow-md"></i>
                                </div>
                                <div className="hidden absolute inset-0 items-center justify-center text-gray-500">
                                     <i data-lucide="map" className="w-10 h-10 mr-3"></i> Static Map Image Placeholder
                                </div>
                            </div>
                        </div>
                        
                        <div className="w-full h-full min-h-[500px] bg-legacy-gray rounded-xl overflow-hidden flex items-center justify-center border-2 border-legacy-rosegold/30 shadow-2xl relative">
                            <iframe 
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14041.670261947238!2d77.09062335!3d28.37640275!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390d226a2f7c0001%3A0x656461a29a008c2!2sSector%2063A%2C%20Gurugram%2C%20Haryana!5e0!3m2!1sen!2sin!4v1715000000000!5m2!1sen!2sin" 
                                width="100%" 
                                height="100%" 
                                style={{ border: 0, position: 'absolute', top: 0, left: 0 }} 
                                allowFullScreen="" 
                                loading="lazy" 
                                referrerPolicy="no-referrer-when-downgrade">
                            </iframe>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Footer = () => (
            <footer id="contact" className="bg-[#111315] pt-20 pb-10 border-t border-legacy-rosegold/20 scroll-mt-20">
                <div className="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-16 mb-16">
                        <div>
                            <h3 className="text-3xl font-serif text-white mb-6 uppercase">{projectData.brokerage}</h3>
                            <p className="text-gray-400 text-lg leading-relaxed mb-6">
                                Your trusted real estate advisory partner. We bring you the finest luxury addresses across Delhi NCR. 
                            </p>
                            <div className="flex items-center space-x-4 text-legacy-rosegold mb-4">
                                <i data-lucide="user" className="w-6 h-6"></i>
                                <span className="text-xl font-semibold text-white">{projectData.brokerName}</span>
                            </div>
                            <div className="flex items-center space-x-4 text-legacy-rosegold">
                                <i data-lucide="phone" className="w-6 h-6"></i>
                                <span className="text-xl font-semibold text-white">+91 {projectData.contactPhone}</span>
                            </div>
                        </div>
                        
                        <div>
                            <h4 className="text-xl font-bold text-white mb-6 border-b border-gray-700 pb-2 inline-block">Quick Links</h4>
                            <ul className="space-y-4 text-gray-400 text-lg">
                                <li><a href="#overview" className="hover:text-legacy-rosegold transition">Overview</a></li>
                                <li><a href="#pricelist" className="hover:text-legacy-rosegold transition">Price List</a></li>
                                <li><a href="#floorplans" className="hover:text-legacy-rosegold transition">Floor Plans</a></li>
                                <li><a href="#location" className="hover:text-legacy-rosegold transition">Location Map</a></li>
                            </ul>
                        </div>

                        <div>
                            <h4 className="text-xl font-bold text-white mb-6 border-b border-gray-700 pb-2 inline-block">Legal Info</h4>
                            <ul className="space-y-4 text-gray-400 text-lg">
                                <li><a href="#" target="_blank" className="hover:text-legacy-rosegold transition">About Us</a></li>
                                <li><a href="#" target="_blank" className="hover:text-legacy-rosegold transition">Privacy Policy</a></li>
                                <li><a href="#" target="_blank" className="hover:text-legacy-rosegold transition">Terms and Conditions</a></li>
                            </ul>
                            <p className="mt-8 text-sm text-gray-600 leading-relaxed">
                                RERA Registration No. {projectData.rera}<br/>
                                Developed by {projectData.developer}.
                            </p>
                        </div>
                    </div>
                    
                    <div className="text-center text-sm text-gray-600 border-t border-gray-800 pt-10">
                        <p className="max-w-5xl mx-auto mb-4 leading-relaxed">
                            Disclaimer: The facilities, layouts, specifications, and information contained herein are indicative and subject to change without prior notice. This website is maintained by {projectData.brokerage}, an authorized channel partner.
                        </p>
                        <p className="font-semibold tracking-wide">© 2026 {projectData.brokerage}. All rights reserved.</p>
                    </div>
                </div>
            </footer>
        );

        const FloatingCTAs = () => (
            <div className="fixed bottom-8 right-8 flex flex-col space-y-4 z-40">
                <a href="#top" className="w-12 h-12 bg-gray-800 border border-gray-600 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition group cursor-pointer relative opacity-80 hover:opacity-100">
                    <i data-lucide="arrow-up" className="text-white w-6 h-6"></i>
                    <span className="absolute right-16 bg-legacy-dark text-white text-sm py-2 px-3 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap border border-gray-700">Back to Top</span>
                </a>
                <a href={`tel:+91${projectData.contactPhone}`} className="w-16 h-16 bg-legacy-gray border-2 border-legacy-rosegold rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition group cursor-pointer relative">
                    <i data-lucide="phone" className="text-legacy-rosegold w-7 h-7"></i>
                    <span className="absolute right-20 bg-legacy-dark text-white text-sm py-2 px-3 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap border border-gray-700 font-semibold">Call Us</span>
                </a>
                <a href={`https://wa.me/91${projectData.contactPhone}?text=Hi%20I%20am%20interested%20in%20The%20Legacy`} target="_blank" className="w-16 h-16 bg-[#25D366] rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition group cursor-pointer relative">
                    <svg className="w-9 h-9 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.567-10.563 5.824 0 10.564 4.74 10.564 10.564 0 5.825-4.74 10.565-10.564 10.564z"/></svg>
                    <span className="absolute right-20 bg-legacy-dark text-white text-sm py-2 px-3 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap border border-gray-700 font-semibold">WhatsApp Chat</span>
                </a>
                <div className="w-16 h-16 bg-legacy-rosegold rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition group cursor-pointer relative" onClick={() => alert('Prithvi AI Agent Widget will open here.')}>
                    <i data-lucide="message-square" className="text-legacy-dark w-7 h-7"></i>
                    <span className="absolute right-20 bg-legacy-dark text-white text-sm py-2 px-3 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap border border-gray-700 font-semibold">Chat with Prithvi AI</span>
                </div>
            </div>
        );

        const App = () => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [expandedImage, setExpandedImage] = useState(null);

            useEffect(() => { 
                lucide.createIcons(); 
            }, [isModalOpen, expandedImage]);

            return (
                <div className="min-h-screen bg-legacy-dark selection:bg-legacy-rosegold selection:text-legacy-dark relative">
                    <Navbar onEnquire={() => setIsModalOpen(true)} />
                    <Hero />
                    <Overview />
                    <Amenities />
                    <PriceList onEnquire={() => setIsModalOpen(true)} />
                    <FloorPlans onImageClick={(imgSrc) => setExpandedImage(imgSrc)} />
                    <Location onImageClick={(imgSrc) => setExpandedImage(imgSrc)} />
                    <Footer />
                    <FloatingCTAs />
                    
                    <EnquiryModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} />
                    <ImageLightboxModal imageSrc={expandedImage} onClose={() => setExpandedImage(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
